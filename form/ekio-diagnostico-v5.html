<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Diagnóstico de Salud Ambiental | EKIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #3B49DF;
      --blue-dk: #2A37C8;
      --text:    #111827;
      --muted:   #6B7280;
      --border:  #E5E7EB;
      --bg-page: #F3F4F6;
      --bg-card: #FFFFFF;
      --radius:  16px;
    }

    html, body {
      height: 100%;
      background: var(--bg-page);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ── Layout ── */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px 16px 40px;
      max-width: 600px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 0 1px rgba(0,0,0,0.06);
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 480px;
    }

    /* ── Progress ── */
    .progress-bar {
      height: 3px;
      background: var(--border);
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Screen ── */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 32px 28px 28px;
    }

    /* ── Welcome ── */
    .welcome-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .welcome-logo span {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .welcome-desc {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 24px;
      flex: 1;
    }
    .welcome-meta {
      font-size: 0.82rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 14px;
    }

    /* ── Question ── */
    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 28px;
    }
    .q-badge {
      width: 28px;
      height: 28px;
      min-width: 28px;
      background: var(--blue);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
      flex: 1;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .rating-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .r-btn {
      flex: 1;
      height: 54px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #F9FAFB;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s, color 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .r-btn:active { transform: scale(0.92); }
    .r-btn.selected {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
      font-weight: 600;
    }
    .r-btn.pulse { animation: pulse-select 0.22s ease; }
    @keyframes pulse-select {
      0%   { transform: scale(1); }
      50%  { transform: scale(0.85); }
      100% { transform: scale(1); }
    }

    /* ── Bottom bar ── */
    .bottom {
      margin-top: auto;
      padding-top: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bottom-left { display: flex; align-items: center; gap: 10px; }

    /* ── Nav arrows ── */
    .nav-arrows {
      display: flex;
      gap: 6px;
    }
    .nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: #F9FAFB;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.12s, border-color 0.12s;
      color: var(--muted);
    }
    .nav-btn:hover { background: var(--border); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.85rem 1.75rem;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.975rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      border: none;
      white-space: nowrap;
    }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn-primary {
      background: var(--blue);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dk); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-full { display: flex; width: 100%; justify-content: center; }

    /* ── Legal ── */
    .section-title {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .section-sub {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .legal-box {
      background: #F9FAFB;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .legal-box a { color: var(--blue); text-decoration: none; }
    .check-label {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      margin-bottom: 28px;
    }
    .check-label input[type="checkbox"] {
      width: 20px;
      height: 20px;
      min-width: 20px;
      flex-shrink: 0;
      margin-top: 1px;
      accent-color: var(--blue);
      cursor: pointer;
    }
    .check-label span {
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.55;
    }

    /* ── Contact ── */
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 5px;
    }
    .form-row label .opt {
      font-weight: 400;
      color: var(--muted);
    }
    .form-row input {
      width: 100%;
      padding: 0.85rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.975rem;
      color: var(--text);
      background: var(--bg-card);
      transition: border-color 0.18s;
      -webkit-appearance: none;
      outline: none;
    }
    .form-row input:focus { border-color: var(--blue); }
    .form-row input::placeholder { color: #C4C9D4; }

    .wa-check {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      margin-top: 4px;
      margin-bottom: 24px;
    }
    .wa-check input {
      width: 18px;
      height: 18px;
      min-width: 18px;
      flex-shrink: 0;
      accent-color: var(--blue);
      cursor: pointer;
      margin-top: 2px;
    }
    .wa-check span {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Thanks ── */
    .thanks-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #EEF0FD;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .thanks-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    .thanks-text {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .thanks-text strong { color: var(--text); }
    .thanks-card {
      background: #F0F1FD;
      border-radius: 12px;
      padding: 20px;
    }
    .thanks-card-tag {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 6px;
    }
    .thanks-card-text {
      font-size: 0.88rem;
      color: #374151;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="page">
  <h1 class="page-title" id="pageTitle">Diagnóstico EHS</h1>
  <div class="card">
    <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
    <div class="screen" id="screen"></div>
  </div>
</div>

<script>
const N8N_WEBHOOK = 'https://crm-ekio-n8n.idv05l.easypanel.host/webhook/ekio-diagnostico';

const QUESTIONS = [
  { key:'fatiga',             text:'¿En qué medida experimentas fatiga (cansancio general)?' },
  { key:'insomnio',           text:'¿Con qué frecuencia experimentas problemas para dormir o insomnio?' },
  { key:'sueno_exceso',       text:'¿Has notado que duermes en exceso?' },
  { key:'irritabilidad',      text:'¿Cuánto te afecta la irritabilidad a tu bienestar?' },
  { key:'nerviosismo',        text:'¿Hasta qué punto sientes nerviosismo?' },
  { key:'piel_erupciones',    text:'¿Has experimentado problemas en la piel, como erupciones o picazón?' },
  { key:'taquicardia',        text:'¿Cuánto te afecta un ritmo anormal del corazón o taquicardia?' },
  { key:'presion_arterial',   text:'¿Has experimentado problemas de presión arterial?' },
  { key:'colon_irritable',    text:'¿Has notado síntomas de síndrome de colon irritable?' },
  { key:'perdida_auditiva',   text:'¿Has experimentado pérdida auditiva?' },
  { key:'dolor_oidos',        text:'¿Sientes dolor en los oídos?' },
  { key:'tinnitus',           text:'¿Qué tan frecuentemente experimentas zumbidos en los oídos (tinnitus)?' },
  { key:'dolor_cejas',        text:'¿Has experimentado dolor en las cejas?' },
  { key:'vision_borrosa',     text:'¿En qué medida te afecta la visión borrosa?' },
  { key:'mareo',              text:'¿Cuánto nivel de mareo experimentas?' },
  { key:'concentracion',      text:'¿Has notado problemas de concentración?' },
  { key:'memoria',            text:'¿Has experimentado problemas de memoria a corto plazo?' },
  { key:'dolor_cabeza',       text:'¿Has tenido dolores de cabeza?' },
  { key:'enrojecimiento',     text:'¿Has experimentado enrojecimiento o inflamación facial?' },
  { key:'calor_rostro',       text:'¿Sientes una sensación de calor en el rostro?' },
  { key:'presion_cabeza',     text:'¿Has sentido una sensación de presión en la cabeza?' },
  { key:'banda_cabeza',       text:'¿Has experimentado una sensación de banda apretada alrededor de la cabeza?' },
  { key:'pinchazos_piel',     text:'¿Has sentido pinchazos en la piel?' },
  { key:'presion_pecho',      text:'¿Has experimentado una sensación de presión en el pecho?' },
  { key:'falta_oxigeno',      text:'¿Has sentido una sensación de falta de oxígeno?' },
];

let step = 0;
let answers = {};
let contact = { nombre:'', ciudad:'', email:'', whatsapp:'', wa_opt: false };
let legalOk = false;
let submitting = false;

const TOTAL = QUESTIONS.length + 3;

function progress() {
  if (step === 0) return 0;
  if (step >= 28) return 100;
  return Math.round((step / TOTAL) * 100);
}

function totalScore() {
  return Object.values(answers).reduce((s, v) => s + v, 0);
}

function profile(score) {
  if (score <= 39)  return { nivel:1, slug:'sin_indicios',    label:'Sin indicios claros de posible EHS' };
  if (score <= 58)  return { nivel:2, slug:'posible_inicio',  label:'Indicaciones de posible desarrollo de ElectroSensibilidad' };
  if (score <= 71)  return { nivel:3, slug:'intermitente',    label:'Potencial caso de Electro-Sensibilidad Intermitente' };
  if (score <= 110) return { nivel:4, slug:'electrosensible', label:'Potencial caso de Electro-Sensibilidad' };
  return                   { nivel:5, slug:'ehs',             label:'Potencial caso de EHS (Hipersensibilidad Electromagnética)' };
}

function subscores() {
  const a = answers;
  return {
    energia:       (a.fatiga||0) + (a.sueno_exceso||0),
    sueno:         (a.insomnio||0),
    emocional:     (a.irritabilidad||0) + (a.nerviosismo||0),
    piel:          (a.piel_erupciones||0) + (a.pinchazos_piel||0),
    cardiovascular:(a.taquicardia||0) + (a.presion_arterial||0) + (a.presion_pecho||0) + (a.falta_oxigeno||0),
    digestivo:     (a.colon_irritable||0),
    auditivo:      (a.perdida_auditiva||0) + (a.dolor_oidos||0) + (a.tinnitus||0),
    neurologico:   (a.dolor_cejas||0) + (a.mareo||0) + (a.concentracion||0) + (a.memoria||0) + (a.dolor_cabeza||0) + (a.presion_cabeza||0) + (a.banda_cabeza||0),
    visual:        (a.vision_borrosa||0),
    facial:        (a.enrojecimiento||0) + (a.calor_rostro||0),
  };
}

function contactValid() {
  return contact.nombre.trim() && contact.email.trim() && contact.email.includes('@') && contact.ciudad.trim();
}

async function postWebhook() {
  const score = totalScore();
  const p = profile(score);
  const payload = {
    ...contact,
    score_total: score,
    perfil: p.label,
    perfil_slug: p.slug,
    nivel: p.nivel,
    subscores: subscores(),
    respuestas: answers,
    fecha: new Date().toISOString(),
  };
  try {
    await fetch(N8N_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch(e) { console.warn('Webhook error:', e); }
}

/* ── RENDER ── */
function html() {
  if (step === 0) return renderWelcome();
  if (step >= 1 && step <= 25) return renderQuestion(step - 1);
  if (step === 26) return renderLegal();
  if (step === 27) return renderContact();
  return renderThanks();
}

function renderWelcome() {
  return `
    <div class="welcome-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="7" fill="#3B49DF"/>
        <path d="M7 14 Q14 6 21 14 Q14 22 7 14Z" fill="#7B88F0"/>
        <circle cx="14" cy="14" r="3" fill="#fff"/>
      </svg>
      <span>EKIO</span>
    </div>
    <p class="welcome-desc">
      El resultado de este test te dará una valoración de tu grado de exposición y afectación a la contaminación electromagnética.<br><br>
      Recibirás tu puntuación en tu correo al completar la encuesta.<br><br>
      Por favor, califica cada pregunta en una escala del <strong>0 al 10</strong>, donde <strong>0</strong> indica "Ningún impacto" y <strong>10</strong> indica "Impacto extremadamente severo".
    </p>
    <div class="bottom" style="flex-direction:column;gap:10px;align-items:flex-start;">
      <button class="btn btn-primary" onclick="goNext()">Comenzar</button>
      <div class="welcome-meta">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Dura 4 minutos
      </div>
    </div>`;
}

function renderQuestion(idx) {
  const q = QUESTIONS[idx];
  const sel = answers[q.key];
  const row1 = [0,1,2,3,4,5];
  const row2 = [6,7,8,9,10];
  const btnRow = vals => vals.map(v =>
    `<button class="r-btn${sel===v?' selected':''}" id="rb${v}" onclick="pick('${q.key}',${v})">${v}</button>`
  ).join('');
  return `
    <div class="q-header">
      <div class="q-badge">${idx+1}</div>
      <p class="q-text">${q.text}</p>
    </div>
    <div class="scale-labels"><span>Nada</span><span>Mucho</span></div>
    <div class="rating-row">${btnRow(row1)}</div>
    <div class="rating-row">${btnRow(row2)}</div>
    <div class="bottom">
      <button class="btn btn-primary" onclick="acceptAnswer()" id="acceptBtn" ${sel===undefined?'disabled':''}>Aceptar</button>
      <div class="nav-arrows">
        <button class="nav-btn" onclick="goBack()" ${step<=1?'disabled':''} title="Anterior">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="nav-btn" onclick="goNext()" ${sel===undefined?'disabled':''} title="Siguiente">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>
    </div>`;
}

function renderLegal() {
  return `
    <h2 class="section-title">Casi listo</h2>
    <p class="section-sub">Antes de compartir tus datos necesitamos tu consentimiento.</p>
    <div class="legal-box">
      Los datos que nos facilites serán tratados por EKIO para enviarte tu resultado y comunicaciones sobre nuestros productos. Puedes ejercer tus derechos de acceso, rectificación y supresión escribiendo a <a href="mailto:info@ekio.es">info@ekio.es</a>. Más información en nuestra <a href="https://ekio.es/privacidad" target="_blank">política de privacidad</a>.
    </div>
    <label class="check-label">
      <input type="checkbox" id="legalChk" ${legalOk?'checked':''} onchange="toggleLegal(this.checked)">
      <span>Acepto los términos legales y el tratamiento de mis datos personales por parte de EKIO.</span>
    </label>
    <div class="bottom">
      <button class="btn btn-primary" id="legalBtn" onclick="goNext()" ${!legalOk?'disabled':''}>Continuar</button>
      <div class="nav-arrows">
        <button class="nav-btn" onclick="goBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
    </div>`;
}

function renderContact() {
  const c = contact;
  return `
    <h2 class="section-title">¿A dónde enviamos tu resultado?</h2>
    <p class="section-sub">Recibirás tu diagnóstico personalizado de forma gratuita.</p>
    <div class="form-row">
      <label>Nombre</label>
      <input type="text" placeholder="Tu nombre" value="${esc(c.nombre)}" oninput="upd('nombre',this.value)" autocomplete="given-name">
    </div>
    <div class="form-row">
      <label>Ciudad</label>
      <input type="text" placeholder="Tu ciudad" value="${esc(c.ciudad)}" oninput="upd('ciudad',this.value)" autocomplete="address-level2">
    </div>
    <div class="form-row">
      <label>Email</label>
      <input type="email" placeholder="tu@email.com" value="${esc(c.email)}" oninput="upd('email',this.value)" autocomplete="email" inputmode="email">
    </div>
    <div class="form-row">
      <label>WhatsApp <span class="opt">(opcional)</span></label>
      <input type="tel" placeholder="+34 600 000 000" value="${esc(c.whatsapp)}" oninput="upd('whatsapp',this.value)" autocomplete="tel" inputmode="tel">
    </div>
    <label class="wa-check">
      <input type="checkbox" ${c.wa_opt?'checked':''} onchange="upd('wa_opt',this.checked)">
      <span>Quiero recibir mi resultado también por WhatsApp</span>
    </label>
    <div class="bottom">
      <button class="btn btn-primary" id="submitBtn" onclick="submitForm()" ${!contactValid()?'disabled':''}>
        ${submitting ? 'Enviando…' : 'Ver mi resultado →'}
      </button>
      <div class="nav-arrows">
        <button class="nav-btn" onclick="goBack()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
      </div>
    </div>`;
}

function renderThanks() {
  const email = contact.email;
  const hasWa = contact.whatsapp && contact.wa_opt;
  return `
    <div style="display:flex;flex-direction:column;align-items:flex-start;">
      <div class="thanks-icon">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <path d="M7 16L13 22L25 10" stroke="#3B49DF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="thanks-title">¡Diagnóstico completado!</h1>
      <p class="thanks-text">Hemos recibido tus respuestas. En breve recibirás tu análisis personalizado en <strong>${esc(email)}</strong>.${hasWa ? ' También te enviaremos un resumen por WhatsApp.' : ''}</p>
      <div class="thanks-card">
        <p class="thanks-card-tag">Mientras esperas</p>
        <p class="thanks-card-text">En EKIO ayudamos a miles de personas a recuperar su bienestar diseñando entornos neurosaludables con tecnología propia. Revisa tu email en los próximos minutos.</p>
      </div>
    </div>`;
}

/* ── ACCIONES ── */
function goNext() {
  if (step < 28) { step++; render(); }
}
function goBack() {
  if (step > 0) { step--; render(); }
}
function acceptAnswer() {
  goNext();
}

function pick(key, val) {
  answers[key] = val;
  const btn = document.getElementById('rb' + val);
  if (btn) btn.classList.add('pulse');
  // Habilitar botón Aceptar y flechas
  const acceptBtn = document.getElementById('acceptBtn');
  if (acceptBtn) acceptBtn.disabled = false;
  // Auto-avance tras 280ms
  setTimeout(goNext, 280);
}

function toggleLegal(v) {
  legalOk = v;
  const b = document.getElementById('legalBtn');
  if (b) b.disabled = !v;
}

function upd(field, val) {
  contact[field] = val;
  const b = document.getElementById('submitBtn');
  if (b) b.disabled = !contactValid();
}

async function submitForm() {
  if (!contactValid() || submitting) return;
  submitting = true;
  const b = document.getElementById('submitBtn');
  if (b) { b.disabled = true; b.textContent = 'Enviando…'; }
  await postWebhook();
  submitting = false;
  step = 28;
  render();
}

function esc(str) {
  return (str||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

/* ── RENDER ENGINE ── */
let rendering = false;
function render() {
  const fill = document.getElementById('pFill');
  fill.style.width = progress() + '%';

  // Actualizar título según paso
  const title = document.getElementById('pageTitle');
  if (title) {
    title.textContent = step === 0 ? 'Diagnóstico EHS' : step >= 28 ? '¡Listo!' : 'Test CEM';
  }

  const screen = document.getElementById('screen');
  if (rendering) return;
  rendering = true;

  screen.style.transition = 'opacity 0.18s ease, transform 0.18s ease';
  screen.style.opacity = '0';
  screen.style.transform = 'translateX(-16px)';

  setTimeout(() => {
    screen.innerHTML = html();
    screen.style.transition = 'none';
    screen.style.transform = 'translateX(16px)';
    screen.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        screen.style.transition = 'opacity 0.24s ease, transform 0.24s ease';
        screen.style.opacity = '1';
        screen.style.transform = 'translateX(0)';
        rendering = false;
      });
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 180);
}

render();
</script>
